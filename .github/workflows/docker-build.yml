name: Java CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  IMAGE_NAME: java-demo

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # Checkout Source Code
      - name: Checkout Source
        uses: actions/checkout@v4

      # Setup Java
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # Build
      - name: Build Application
        run: mvn clean package

      # Unit Test
      - name: Run Unit Tests
        run: mvn test

      # Verify Secrets
      - name: Verify Sonar Secrets
        run: |
          if [ -z "${{ secrets.SONAR_TOKEN }}" ]; then
            echo "SONAR_TOKEN is EMPTY"
            exit 1
          fi

          if [ -z "${{ secrets.SONAR_HOST_URL }}" ]; then
            echo "SONAR_HOST_URL is EMPTY"
            exit 1
          fi

          echo "SONAR_HOST_URL is configured"

      # Test Connectivity
      - name: Test SonarQube Connectivity
        run: |
          curl -I ${{ secrets.SONAR_HOST_URL }}

      # SonarQube Scan
      - name: SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          mvn clean verify sonar:sonar \
            -Dsonar.projectKey=java-demo \
            -Dsonar.host.url=$SONAR_HOST_URL \
            -Dsonar.token=$SONAR_TOKEN

      # Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME:${{ github.sha }} .

      # Trivy Scan
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: java-demo:${{ github.sha }}
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: CRITICAL,HIGH

name: Java CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  IMAGE_NAME: java-demo
  ECR_REPOSITORY: java-demo

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    # Checkout Source
    - name: Checkout Source
      uses: actions/checkout@v4

    # Setup Java
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'
        cache: maven

    # Build
    - name: Build Application
      run: mvn clean package

    # Unit Test
    - name: Run Unit Tests
      run: mvn test

    # Verify Sonar Secrets
    - name: Verify Sonar Secrets
      run: |
        if [ -z "${{ secrets.SONAR_TOKEN }}" ]; then
          echo "SONAR_TOKEN is EMPTY"
          exit 1
        fi

        if [ -z "${{ secrets.SONAR_HOST_URL }}" ]; then
          echo "SONAR_HOST_URL is EMPTY"
          exit 1
        fi

        echo "SonarQube secrets verified."

    # Test Sonar Connectivity
    - name: Test SonarQube Connectivity
      run: |
        curl -I ${{ secrets.SONAR_HOST_URL }}

    # SonarQube Scan
    - name: SonarQube Scan
      env:
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        mvn sonar:sonar \
          -Dsonar.projectKey=java-demo \
          -Dsonar.host.url=$SONAR_HOST_URL \
          -Dsonar.token=$SONAR_TOKEN

    # Build Docker Image
    - name: Build Docker Image
      run: |
        docker build -t $IMAGE_NAME:${{ github.sha }} .

    # Verify Docker Image
    - name: Verify Docker Image
      run: |
        docker images

    # Trivy Scan
    - name: Run Trivy Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: java-demo:${{ github.sha }}
        format: table
        exit-code: '0'
        ignore-unfixed: true
        severity: CRITICAL,HIGH

    # Configure AWS Credentials
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # Login to Amazon ECR
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # Tag Docker Image
    - name: Tag Docker Image
      run: |
        docker tag \
        java-demo:${{ github.sha }} \
        ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

    # Push Docker Image
    - name: Push Docker Image
      run: |
        docker push \
        ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

    # Success Message
    - name: Pipeline Completed
      run: |
        echo "=================================="
        echo "Java Build Completed"
        echo "SonarQube Scan Completed"
        echo "Docker Build Completed"
        echo "Trivy Scan Completed"
        echo "Docker Image Pushed to Amazon ECR"
        echo "=================================="
